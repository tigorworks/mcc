name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SCRIPT_URL secret
        run: |
          if [ -z "${{ secrets.SCRIPT_URL }}" ]; then
            echo "ERROR: Secret SCRIPT_URL belum di-set di repository settings."
            exit 1
          fi

      - name: Inject SCRIPT_URL secret
        run: |
          sed -i "s|__SCRIPT_URL__|${{ secrets.SCRIPT_URL }}|g" assets/js/pages/register.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
